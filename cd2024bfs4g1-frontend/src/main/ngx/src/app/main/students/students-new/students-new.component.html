
 <o-form #form  attr="studentsNew" service="students" entity="student" keys="id" header-actions="R;I;U;D"
 show-header-navigation="no" after-insert-mode="new" confirm-exit="no">
 <mat-tab-group oTabGroup="material" color="primary" id="tabGroup">
   <mat-tab label="{{'Main data'|oTranslate}}">
     <o-text-input #idNumber hidden attr="id" sql-type="INTEGER" enabled="no" />
     <div class="grid-container">
       <fieldset title="Datos personales" class="datos">
         <legend>{{"Personal data"|oTranslate}}</legend>
         <div class="datosPrincipales1">
           <div class="foto">
             <o-image #UsrPhoto attr="usr_photo" empty-image="assets/images/no-image.png"
                      sql-type="OTHER" class="avatar" (onChange)="onImageChange($event)"
                      max-file-size="409600" accept-file-type="image/png,image/jpeg,image/gif,image/jpg"
                      label="PROFILE.EDIT_PHOTO" ></o-image>
           </div>
           <div>
             <label for="name">{{'REQ_LNAME'|oTranslate}}</label>
             <o-text-input attr="name" [validators]="validatorsWithoutSpace" required="yes" id="name" max-length="255"
               (input)="toUpperCamelCase($event)"></o-text-input>
           </div>
           <div>
             <label for="surname1">{{'REQ_LSURNAME1'|oTranslate}}</label>
             <o-text-input attr="surname1" [validators]="validatorsWithoutSpace" required="yes" max-length="255"
               (input)="toUpperCamelCase($event)"></o-text-input>
           </div>
           <div>
             <label for="surname2">{{'LSURNAME2' | oTranslate}}</label>
             <o-text-input attr="surname2" required="no" max-length="255"
               (input)="toUpperCamelCase($event)"></o-text-input>
           </div>
         </div>
         <div class="datosPrincipales2">
           <div class="dni">
             <label for="LDNI">{{'REQ_LDNI' | oTranslate}}</label>
             <o-nif-input attr="dni" label="{{'NIF' | oTranslate}}" read-only="no" required="yes" (onBlur)="mostrar($event)"></o-nif-input>
             <div class="aviso" *ngIf="showNotice">
                 <link rel="stylesheet"/>
                 <label for="dni" >{{'DNI_WARNING'|oTranslate}}<mat-icon svgIcon="ontimize:warning"></mat-icon></label>
             </div>
           </div>
           <div>
             <label for="REQ_LBIRTHDATE">{{'REQ_LBIRTHDATE' | oTranslate}}</label>
             <o-date-input attr="birth_date" required="yes" text-input-enabled="no" format="DD/MM/YYYY"></o-date-input>
           </div>
           <div>
             <label for="LSPAINCOMUNITY">{{'REQ_LSPAINCOMUNITY' | oTranslate}}</label>
             <o-combo attr="spain_comunity" [static-data]="dataArray" [data]="valueSimple" required="yes"
               searchable="yes" value-column="key" columns="key;value" visible-columns="value"
               null-selection="false"></o-combo>
           </div>
           <div>
             <label for="location">{{'LLOCATION' | oTranslate}}</label>
             <o-text-input attr="location" required="no" (input)="toUpperCamelCase($event)"></o-text-input>
           </div>
           <label for="student_status">{{'REQ_LSTATUS' | oTranslate}}</label>
           <o-combo attr="student_status_id" label="{{'LSTATUS' | oTranslate}}" required="yes" translate="yes"
             null-selection="false" [data]="[]" service="studentstatus" entity="studentStatus" keys="id"
             columns="id;status" value-column="id" description-columns="status" query-on-init="true">
           </o-combo>
         </div>
       </fieldset>
       <div class="login">
         <fieldset title="Login">
           <legend>Login</legend>
           <div>
             <label for="usuario">{{'REQ_USER' | oTranslate}}</label>
             <o-text-input attr="usr_login" [validators]="validatorsWithoutSpace" required="yes" id="name"
               max-length="255"></o-text-input>
           </div>
           <div>
             <label for="contraseña">{{'REQ_PASSWORD' | oTranslate}}</label>
             <o-password-input attr="usr_password" required="yes" show-password-button="true" in-length="8"
               [validators]="validatorsNewPasswordArray">
               <o-validator error-name="hasCapitalCase" error-text="VALIDATOR.HASCAPITALCASE"></o-validator>
               <o-validator error-name="hasNumber" error-text="VALIDATOR.HASNUMBER"></o-validator>
               <o-validator error-name="hasSmallCase" error-text="VALIDATOR.HASSMALLCASE"></o-validator>
             </o-password-input>
           </div>
         </fieldset>
         <br>
         <div class="contacto">
           <fieldset title="Fct">
             <legend>{{"Contact"|oTranslate}}</legend>
             <div>
               <label for="REQ_LPHONE">{{'REQ_LPHONE' | oTranslate}}</label>
               <o-phone-input attr="phone" required="yes" automatic-binding="false" [data]="'+34 000000000'"></o-phone-input>
             </div>
             <div>
               <label for="REQ_LEMAIL">{{'REQ_LEMAIL'|oTranslate}}</label>
               <o-email-input attr="personal_email" required="yes"></o-email-input>
             </div>
             <div>
               <label for="LCAMPUS_EMAIL">{{'LCAMPUS_EMAIL' | oTranslate}}</label>
               <o-email-input attr="campus_email" required="no"></o-email-input>
             </div>
           </fieldset>
         </div>
       </div>
     </div>
   </mat-tab>
   <mat-tab label="{{'FCT Information'|oTranslate}}">
     <div class="fct-container">
       <fieldset title="fct" class="fct-grid">
         <legend>{{"FCT Information"|oTranslate}}</legend>
         <div>
           <label for="fct_school">{{'LFCT_SCHOOL' | oTranslate}}</label>
           <o-text-input attr="fct_school" required="no" max-length="100"
             (input)="toUpperCamelCase($event)"></o-text-input>
         </div>
         <div>
           <label for="tutor">{{'LTUTOR' | oTranslate}}</label>
           <o-combo attr="tutor" service="tutors" entity="tutor" required="no" searchable="yes" value-column="id"
             columns="id;name;surname1;surname2" visible-columns="name;surname1;surname2" null-selection="true"
             sortable="yes" sort="ASC">
           </o-combo>
         </div>
         <div>
           <label for="LFCT_START">{{'LFCT_START' | oTranslate}}</label>
           <o-date-input #startdate attr="fct_start" required="no" text-input-enabled="no " format="DD/MM/YYYY"
             (onValueChange)="throwChange(enddate)">
             <o-validator error-name="wrongendate" error-text="END_DATE_MORE_THAN_INIT_DATE"></o-validator>
           </o-date-input>
         </div>
         <div>
           <label for="LFCT_END">{{'LFCT_END' | oTranslate}}</label>
           <o-date-input #enddate attr="fct_end" required="no" text-input-enabled="no " [validators]="validatorsArray"
             format="DD/MM/YYYY" (onValueChange)="throwChange2(startdate)">
             <o-validator error-name="wrongendate" error-text="END_DATE_MORE_THAN_INIT_DATE"></o-validator>
           </o-date-input>
         </div>
       </fieldset>
       <fieldset title="User" class="user-grid">
         <legend>{{'OtherInformation'|oTranslate}}</legend>
         <div class="githubUser">
           <label for="LGITHUB_USER">{{'LGITHUB_USER' | oTranslate}}</label>
           <o-text-input attr="github_user" required="no" max-length="200"></o-text-input>
         </div>
         <div class="udemy">
           <div class="checkbox-container">
             <o-checkbox attr="udemy"></o-checkbox>
           </div>
         </div>
       </fieldset>
       <fieldset title="Notas">
         <legend for="LNOTES">{{'LNOTES' | oTranslate}}</legend>
         <div class="notes">
           <o-textarea-input attr="notes" required="no" max-length="1000"></o-textarea-input>
         </div>
       </fieldset>
     </div>
   </mat-tab>
 </mat-tab-group>
</o-form>
