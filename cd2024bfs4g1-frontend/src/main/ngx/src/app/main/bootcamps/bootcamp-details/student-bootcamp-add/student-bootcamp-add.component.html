<o-form #studentBootcampForm service="studentBootcamps" entity="studentBootcamp" show-header="no">
    <div class="header">Inserta Alumno en Bootcamp</div>
    <o-text-input attr="bootcamp_id" sql-type="INTEGER" enabled="no" hidden="true"></o-text-input>
    <o-combo attr="student_id" label="Students" value-column="id" columns="id;name;surnames" service="students"
        entity="student" visible-columns="name;surnames" searchable="yes">
    </o-combo>
</o-form>

<div fxLayout="row">
    <o-button label="Add" (click)="addStudentBootcamp()" layout-padding type="RAISED"></o-button>
    <o-button label="Return" (click)="navigateBack()" layout-padding type="RAISED"></o-button>
</div>
